<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>TravelMind</title>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700;900&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet"/>
  <link rel="stylesheet" href="css/style.css"/>
</head>
<body>

<!-- AUTH SCREEN -->
<div id="auth-screen">
  <div class="auth-card">
    <div class="auth-logo">TravelMind</div>
    <div class="auth-tagline">Your intelligent travel companion</div>
    <div class="tab-row">
      <button class="tab-btn active" onclick="switchTab('login')">Sign In</button>
      <button class="tab-btn" onclick="switchTab('register')">Register</button>
    </div>
    <div id="login-form">
      <div class="form-group"><label>Email</label><input type="email" id="login-email" placeholder="you@email.com"/></div>
      <div class="form-group"><label>Password</label><input type="password" id="login-password" placeholder="min 6 characters"/></div>
      <button class="btn btn-primary" onclick="login()">Sign In</button>
      <div class="error-msg" id="login-error"></div>
    </div>
    <div id="register-form" style="display:none">
      <div class="form-group"><label>Full Name</label><input type="text" id="reg-name" placeholder="Jane Doe"/></div>
      <div class="form-group"><label>Email</label><input type="email" id="reg-email" placeholder="you@email.com"/></div>
      <div class="form-group"><label>Password</label><input type="password" id="reg-password" placeholder="min 6 characters"/></div>
      <button class="btn btn-primary" onclick="register()">Create Account</button>
      <div class="error-msg" id="reg-error"></div>
    </div>
  </div>
</div>

<!-- MAIN APP -->
<div id="app">
  <aside class="sidebar">
    <div class="sidebar-logo">Travel<span>Mind</span></div>
    <nav class="nav-section">
      <div class="nav-label">Menu</div>
      <div class="nav-item active" onclick="showPage('dashboard')"><span class="nav-icon">🗺️</span> Dashboard</div>
      <div class="nav-item" onclick="showPage('trips')"><span class="nav-icon">✈️</span> My Trips</div>
      <div class="nav-item" onclick="showPage('expenses')"><span class="nav-icon">💰</span> Expenses</div>
      <div class="nav-item" onclick="showPage('journal')"><span class="nav-icon">📔</span> Journal</div>
    </nav>
    <div class="sidebar-user">
      <div class="avatar" id="user-avatar">J</div>
      <div class="user-name" id="user-name-display">Traveler</div>
      <button class="logout-btn" onclick="logout()" title="Logout">⏻</button>
    </div>
  </aside>
  <main class="main-content" id="main-content"></main>
</div>

<div id="modals-container"></div>
<div class="toast" id="toast"></div>

<script src="js/api.js"></script>
<script src="js/auth.js"></script>
<script src="js/trips.js"></script>
<script src="js/expenses.js"></script>
<script src="js/journal.js"></script>
<script src="js/app.js"></script>
</body>
</html>
